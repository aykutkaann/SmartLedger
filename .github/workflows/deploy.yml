name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, test & publish
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smartledger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      ConnectionStrings__Postgres: >-
        Host=localhost;Port=5432;Database=smartledger_test;
        Username=postgres;Password=postgres
      Jwt__Key: ${{ secrets.CI_JWT_KEY }}
      Jwt__Issuer: SmartLedger
      Jwt__ExpiryMinutes: "15"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Publish API artifact
        if: github.ref == 'refs/heads/main'
        run: >-
          dotnet publish src/SmartLedger.API/SmartLedger.API.csproj
          -c Release -o ./publish/api

      - name: Upload API artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: smartledger-api
          path: ./publish/api

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t smartledger-api:${{ github.sha }} .

      - name: Build Worker image
        run: docker build -f Dockerfile.worker -t smartledger-worker:${{ github.sha }} .
